<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSmart Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #22c55e;
            --accent: #3b82f6;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding-bottom: 90px;
            min-height: 100vh;
        }

        /* Header Style */
        .app-header {
            padding: 30px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .app-header h1 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(to right, #22c55e, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Container & Cards */
        .container { padding: 0 20px; max-width: 500px; margin: 0 auto; }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Inputs & Buttons */
        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 16px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-main {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 15px;
        }

        .btn-main:active { transform: scale(0.98); }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-link { color: #94a3b8; text-decoration: none; font-size: 12px; text-align: center; flex: 1; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link span { display: block; font-size: 22px; margin-bottom: 4px; }

        /* Pages */
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .active-page { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Result Styles */
        .result-box {
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            border-right: 4px solid var(--primary);
            background: rgba(34, 197, 94, 0.1);
        }

        .warning-box {
            border-right-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }

        .meal-preview {
            width: 100%;
            height: 200px;
            border-radius: 18px;
            object-fit: cover;
            margin-top: 15px;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>NutriSmart AI</h1>
    </div>

    <div class="container">
        
        <div id="home" class="page active-page">
            <div class="card">
                <h3 style="margin-top:0">🍱 اختر وجبتك</h3>
                <select id="mealSelect" onchange="showInfo('home')">
                    <option value="">تصفح الوجبات...</option>
                    <option value="mandi">مندي دجاج 🍗</option>
                    <option value="shawarma">شاورما صاج 🌯</option>
                    <option value="pizza">بيتزا خضار 🍕</option>
                    <option value="salad">سلطة يونانية 🥗</option>
                    <option value="pasta">باستا فرن 🍝</option>
                    <option value="burger">برجر مشوي 🍔</option>
                    <option value="oats">شوفان وعسل 🥣</option>
                    <option value="steak">ستيك بقري 🥩</option>
                </select>
            </div>
            <div id="resHome"></div>
        </div>

        <div id="scan" class="page">
            <div class="card" style="text-align: center;">
                <h3 style="margin-top:0">📸 فحص ذكي</h3>
                <p style="color: #94a3b8">ارفع صورة الوجبة لتحليل المكونات</p>
                <button class="btn-main" onclick="document.getElementById('imgFile').click()">التقط صورة الآن</button>
                <input type="file" id="imgFile" accept="image/*" capture="environment" style="display:none" onchange="handleImg(event)">
                <img id="prev" class="meal-preview">
            </div>
            <div id="resScan"></div>
        </div>

        <div id="profile" class="page">
            <div class="card">
                <h3 style="margin-top:0">👤 الملف الصحي</h3>
                <label>الاسم</label>
                <input type="text" id="uName" placeholder="أدخل اسمك..." oninput="updateU()">
                
                <label style="display:block; margin-top:15px">الحالة الصحية</label>
                <select id="uStatus" onchange="updateU()">
                    <option value="normal">بصحة جيدة</option>
                    <option value="diab">مصاب بالسكري</option>
                    <option value="fit">لياقة بدنية (عالي البروتين)</option>
                </select>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="go('home', this)"><span>🏠</span>الرئيسية</div>
        <div class="nav-link" onclick="go('scan', this)"><span>📸</span>الفحص</div>
        <div class="nav-link" onclick="go('profile', this)"><span>👤</span>الملف</div>
    </div>

    <script>
        const db = {
            mandi: { n: "مندي دجاج", c: 620, s: "عالي", i: "أرز، دجاج، بهارات" },
            shawarma: { n: "شاورما دجاج", c: 420, s: "متوسط", i: "دجاج، خبز، ثوم" },
            pizza: { n: "بيتزا خضار", c: 290, s: "عالي", i: "عجين، جبن، خضار" },
            salad: { n: "سلطة يونانية", c: 140, s: "منخفض", i: "خيار، طماطم، جبنة" },
            pasta: { n: "باستا فرن", c: 510, s: "عالي", i: "مكرونة، كريمة، جبن" },
            burger: { n: "برجر كلاسيك", c: 540, s: "متوسط", i: "لحم، خبز، صوص" },
            oats: { n: "شوفان وعسل", c: 310, s: "متوسط", i: "شوفان، حليب، فواكه" },
            steak: { n: "ستيك مشوي", c: 390, s: "منخفض", i: "لحم، ثوم، زبدة" }
        };

        let uData = { name: "", status: "normal" };

        function go(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function updateU() {
            uData.name = document.getElementById('uName').value;
            uData.status = document.getElementById('uStatus').value;
        }

        function handleImg(e) {
            const p = document.getElementById('prev');
            p.src = URL.createObjectURL(e.target.files[0]);
            p.style.display = 'block';
            setTimeout(() => {
                const ask = prompt("تم التعرف على الصورة! ما هي الوجبة؟ (مندي، بيتزا، برجر، شاورما)");
                const keys = {"مندي":"mandi", "بيتزا":"pizza", "برجر":"burger", "شاورما":"shawarma"};
                if(keys[ask]) showInfo('scan', keys[ask]);
            }, 500);
        }

        function showInfo(loc, key = "") {
            const k = key || document.getElementById('mealSelect').value;
            const div = loc === 'home' ? document.getElementById('resHome') : document.getElementById('resScan');
            if(!k) return;

            const m = db[k];
            let warn = "";
            if(uData.status === 'diab' && m.s === 'عالي') {
                warn = `<div class="result-box warning-box">⚠️ تنبيه السكري: هذه الوجبة عالية الكربوهيدرات.</div>`;
            }

            div.innerHTML = `
                <div class="card" style="border-right: 4px solid var(--primary)">
                    <h3 style="margin:0">${m.n}</h3>
                    <p>🔥 سعرات: ${m.c} | 🥗 المكونات: ${m.i}</p>
                    ${warn || '<div class="result-box">✅ وجبة مثالية لبروفايلك!</div>'}
                </div>
            `;
        }
    </script>
</body>
</html>
