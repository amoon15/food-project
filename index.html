<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScan AI - 30+ Meals</title>
    <style>
        :root { --bg: #050810; --primary: #00f2ff; --card: #101625; --text: #ffffff; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .header { padding: 30px; text-align: center; background: linear-gradient(180deg, #101625 0%, #050810 100%); border-bottom: 1px solid #1e293b; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); text-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .btn-main { background: linear-gradient(135deg, #00f2ff, #0072ff); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        #preview { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 2px solid var(--primary); }
        .loader-area { display: none; text-align: center; margin: 20px 0; }
        .loader { border: 4px solid #161b2a; border-top: 4px solid var(--primary); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .select-area { display: none; animation: slideUp 0.4s; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; background: #050810; color: white; border: 1px solid #1e293b; margin-top: 10px; font-size: 15px; }
        .result-panel { display: none; margin-top: 20px; padding: 15px; border-radius: 15px; border-right: 5px solid var(--primary); background: rgba(0,242,255,0.05); animation: fadeIn 0.5s; }
        .warning { border-right-color: var(--danger); background: rgba(255,77,77,0.05); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #101625; display: flex; padding: 12px 0; border-top: 1px solid #1e293b; }
        .nav-item { flex: 1; text-align: center; color: #64748b; font-size: 13px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header"><h1>NUTRISCAN AI PRO</h1></div>

    <div class="container">
        <div id="scanPage">
            <div class="card">
                <button class="btn-main" onclick="document.getElementById('imgIn').click()">📸 تصوير / رفع صورة الوجبة</button>
                <input type="file" id="imgIn" accept="image/*" style="display:none" onchange="startAI(event)">
                <img id="preview">
                <div id="loader" class="loader-area"><div class="loader"></div><p>جاري التحليل الذكي...</p></div>
                <div id="selection" class="select-area">
                    <p style="color: #64748b">🔍 تم التعرف على عدة احتمالات، اختر الوجبة:</p>
                    <select id="foodList" onchange="showData()"></select>
                </div>
            </div>
            <div id="res" class="result-panel"></div>
        </div>

        <div id="profilePage" style="display:none">
            <div class="card">
                <h3>👤 الملف الصحي</h3>
                <label>الحالة الصحية:</label>
                <select id="userStat" onchange="showData()">
                    <option value="normal">سليم</option>
                    <option value="diab">مصاب بالسكري</option>
                </select>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="tab('scanPage', this)">📸 فحص</div>
        <div class="nav-item" onclick="tab('profilePage', this)">👤 ملفي</div>
    </div>

    <script>
        const db = {
            "ورق عنب": { c: 210, i: "أرز، ورق عنب، زيت، ليمون", s: "عالي" },
            "كبسة دجاج": { c: 550, i: "أرز، دجاج، بهارات، مكسرات", s: "عالي" },
            "مندي": { c: 600, i: "أرز، دجاج مشوي، بهارات مندي", s: "عالي" },
            "بيتزا": { c: 285, i: "عجين، جبنة، صلصة، خضار", s: "عالي" },
            "برجر": { c: 450, i: "لحم، خبز، خس، صوص", s: "متوسط" },
            "شاورما": { c: 420, i: "دجاج، خبز صاج، ثومية", s: "متوسط" },
            "باستا": { c: 380, i: "مكرونة، كريمة، جبنة", s: "عالي" },
            "سلطة يونانية": { c: 150, i: "خيار، طماطم، جبنة فيتا", s: "منخفض" },
            "جريش": { c: 420, i: "قمح، لبن، سمن، بصل", s: "عالي" },
            "ملوخية": { c: 120, i: "ملوخية، ثوم، مرق دجاج", s: "منخفض" },
            "سوشي": { c: 300, i: "أرز، سمك، نوري، خضار", s: "متوسط" },
            "ستيك بقري": { c: 400, i: "لحم بقري، بطاطس مشوية", s: "منخفض" },
            "مطازيز": { c: 480, i: "عجين بر، لحم، خضار", s: "عالي" },
            "فلافل": { c: 350, i: "حمص، بهارات، زيت", s: "متوسط" },
            "حمص": { c: 166, i: "حمص بطحينة، زيت زيتون", s: "منخفض" },
            "شوربة عدس": { c: 180, i: "عدس، بصل، كمون", s: "منخفض" },
            "فول مدمس": { c: 250, i: "فول، زيت، ليمون، ثوم", s: "منخفض" },
            "مصابيب": { c: 320, i: "دقيق بر، عسل، سمن", s: "عالي" },
            "هريس": { c: 450, i: "قمح، لحم، سمن", s: "عالي" },
            "سمك مشوي": { c: 220, i: "سمك، ليمون، بهارات", s: "منخفض" },
            "مقلوبة": { c: 520, i: "أرز، باذنجان، دجاج/لحم", s: "عالي" },
            "فتوش": { c: 140, i: "خضار، خبز محمص، سماق", s: "منخفض" },
            "كبة": { c: 280, i: "برغل، لحم، صنوبر", s: "متوسط" },
            "كوشري": { c: 450, i: "أرز، عدس، مكرونة، صلصة", s: "عالي" },
            "كنافة": { c: 400, i: "عجينة، جبنة، قطر (شيرة)", s: "عالي" },
            "لقيمات": { c: 350, i: "عجين مقلي، عسل/دبس", s: "عالي" },
            "نودلز": { c: 380, i: "عجين الصويا، خضار، دجاج", s: "عالي" },
            "تاكو": { c: 210, i: "خبز ذرة، لحم، جبنة", s: "متوسط" },
            "شوفان": { c: 150, i: "شوفان، حليب، فواكه", s: "منخفض" },
            "بيض مسلوق": { c: 78, i: "بيض فقط", s: "منخفض" },
            "ارز ابيض": { c: 130, i: "أرز، ماء", s: "عالي" },
            "كباب": { c: 320, i: "لحم مشوي، بقدونس", s: "منخفض" }
        };

        // تعبئة القائمة تلقائياً
        const list = document.getElementById('foodList');
        list.innerHTML = '<option value="">اختر من النتائج...</option>';
        Object.keys(db).forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.innerText = name;
            list.appendChild(opt);
        });

        function startAI(e) {
            const img = document.getElementById('preview');
            img.src = URL.createObjectURL(e.target.files[0]);
            img.style.display = 'block';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('selection').style.display = 'none';
            document.getElementById('res').style.display = 'none';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('selection').style.display = 'block';
            }, 2000);
        }

        function showData() {
            const val = document.getElementById('foodList').value;
            const status = document.getElementById('userStat').value;
            const res = document.getElementById('res');
            if(!val) return;
            const f = db[val];
            let isWarning = (status === 'diab' && f.s === 'عالي');
            res.className = isWarning ? "result-panel warning" : "result-panel";
            res.innerHTML = `
                <h3 style="margin:0">${val}</h3>
                <p>🔥 السعرات: ${f.c} | 🥗 المكونات: ${f.i}</p>
                <hr style="opacity:0.1">
                ${isWarning ? '<p style="color:var(--danger)">⚠️ تنبيه: هذه الوجبة غنية بالسكر/الكربوهيدرات.</p>' : '<p style="color:var(--primary)">✅ وجبة مناسبة لبروفايلك الصحي.</p>'}
            `;
            res.style.display = 'block';
        }

        function tab(id, el) {
            document.getElementById('scanPage').style.display = 'none';
            document.getElementById('profilePage').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
