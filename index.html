<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --bg: #0b0f19; --card: #161b2a; --primary: #00d1ff; --accent: #22c55e; --text: #ffffff; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Header */
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #161b2a, #0b0f19); border-bottom: 1px solid #2d3748; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); text-shadow: 0 0 15px rgba(0,209,255,0.3); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        /* Cards */
        .card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #2d3748; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        
        /* Inputs & Buttons */
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #2d3748; background: #0b0f19; color: white; font-size: 16px; margin-top: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }

        /* Images */
